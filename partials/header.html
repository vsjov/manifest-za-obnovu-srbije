<header>
  <nav>
    <span class="site-title">{{title}}</span>
    <div class="header-controls">
      <div class="font-size-controls" role="group" aria-label="Font size">
        <button class="btn-control" data-font-size="small" title="Small text">A−</button>
        <button class="btn-control btn-font-active" data-font-size="medium" title="Medium text">A</button>
        <button class="btn-control" data-font-size="large" title="Large text">A+</button>
      </div>
      <button class="btn-control btn-theme" id="theme-toggle" title="Switch theme">Dark mode</button>
      {{translation}}
    </div>
  </nav>
</header>
