name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Copy committed website
        run: cp -R dist _site

      - name: Apply GitHub Pages base path
        run: find _site -type f -name '*.html' -exec sed -E -i 's#(href|src)="/#\1="'"${PAGES_BASE_PATH}"'/#g' {} +
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
